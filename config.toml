# Groundskeeper configuration. No secrets here — use env vars for credential
# references only, never raw token values.

[groundskeeper]
data_dir = "~/.local/share/groundskeeper"
max_workers = 2
default_runtime = "omp"

[omp]
command = "omp"
mode = "rpc"
auth_managed_by = "omp"

[espalier]
enabled = true
package = "@potato-hash/espalier"
extension_path = ""
config_path = ""
watchdog_path = ""

[loops]
default_max_turns = 8
default_max_wall_minutes = 45
default_max_tool_calls = 80

[approvals]
require_for_external_side_effects = true
require_for_source_promotion = true
expire_after_minutes = 60

[notifications]
mode = "local"
min_severity = "warning"

[sidecars]
enabled = false
