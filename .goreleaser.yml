# GoReleaser configuration
# https://goreleaser.com

version: 2
project_name: groundskeeper

before:
  hooks:
    - go mod tidy
    # Note: go generate is intentionally NOT run here.
    # styles.css is a committed artifact with a drift gate enforced via lefthook
    # and make css-verify. Release builds use the committed CSS directly to
    # avoid requiring tailwindcss in the CI environment.

env:
  - GOTOOLCHAIN=go1.25.11

builds:
  - id: groundskeeper
    main: ./cmd/groundskeeper
    binary: groundskeeper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: potato-hash
    name: groundskeeper
  draft: false
  prerelease: auto
  mode: append
  name_template: "v{{.Version}}"
  header: |
    ## Groundskeeper v{{.Version}}

    Durable agent shell around OMP workers and Espalier Core.

    ### Installation

    **Binary Install (no provider key required):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/potato-hash/groundskeeper/main/install.sh |
      bash -s -- --non-interactive --skip-setup
    ```

    **Full Stack Install with OMP, Espalier, and model verification:**
    ```bash
    export OLLAMA_CLOUD_API_KEY='<your ollama cloud key>'
    curl -fsSL https://raw.githubusercontent.com/potato-hash/groundskeeper/main/install.sh |
      bash -s -- --non-interactive --run-setup --model ollama-cloud/glm-5.2 --verify-model
    ```

    **Go Install:**
    ```bash
    go install github.com/potato-hash/groundskeeper/cmd/groundskeeper@v{{.Version}}
    ```
  footer: |
    ---

    **Full Changelog**: https://github.com/potato-hash/groundskeeper/compare/{{ .PreviousTag }}...{{ .Tag }}
