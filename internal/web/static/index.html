<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1b26" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Agent Deck" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/static/icons/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/icons/logo.svg" />
    <title>Agent Deck</title>

    <!-- 1. Theme init (synchronous, prevents flash of wrong theme).
         This script drives the @variant dark (&:where(.dark, .dark *))
         override in styles.src.css — do NOT remove or reorder. -->
    <script>
      ;(function() {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- 2. Chart.js UMD is lazy-loaded by CostDashboard on demand
         (issue #1022 part 2). It is the ~206 KB Costs-route-only
         dependency, so eagerly shipping it blew the initial-payload
         budget. CostDashboard.js injects /static/chart.umd.min.js the
         first time the Costs tab is rendered. -->

    <!-- 3. Import map: single Preact instance via bare specifiers -->
    <script type="importmap">
    {
      "imports": {
        "preact":          "/static/vendor/preact.mjs",
        "preact/hooks":    "/static/vendor/preact-hooks.mjs",
        "htm/preact":      "/static/vendor/htm.mjs",
        "@preact/signals": "/static/vendor/signals.mjs",
        "@xterm/xterm":       "/static/vendor/xterm.mjs",
        "@xterm/addon-fit":   "/static/vendor/addon-fit.mjs",
        "@xterm/addon-webgl": "/static/vendor/addon-webgl.mjs"
      }
    }
    </script>

    <!-- 4. Preact app entry (module, deferred by default).
         PERF-H: {{ASSET:app/main.js}} is resolved at serve-time by
         assets.SubstitutePlaceholders. In dev mode (no manifest) it
         resolves to /static/app/main.js; in prod mode it resolves to
         /static/dist/main.[hash].js from the bundler manifest. The
         on-disk file stays hand-written with the placeholder so
         bundling never makes the tree dirty. -->
    <script type="module" src="{{ASSET:app/main.js}}"></script>

    <!-- 5. Stylesheets — LAST in <head> to win the cascade.
         Order matters:
           xterm.css         → terminal vendor styles (preserved)
           styles.css        → compiled Tailwind v4 output (preserved for legacy components)
           design-tokens.css → bundle's CSS custom properties (PR-B redesign)
           app.css           → bundle's component-class rules (PR-B redesign)
         design-tokens.css must precede app.css so component rules can resolve `var(--*)`. -->
    <link rel="stylesheet" href="/static/vendor/xterm.css" />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet" />
    <link rel="stylesheet" href="/static/app/design-tokens.css" />
    <link rel="stylesheet" href="/static/app/app.css" />
  </head>
  <body class="bg-gray-100 dark:bg-tn-bg text-gray-900 dark:text-tn-fg min-h-screen"
        data-accent="blue" data-density="balanced" data-rail="visible">
    <!-- Preact app mounts here -->
    <div id="app-root" class="min-h-screen"></div>
  </body>
</html>
