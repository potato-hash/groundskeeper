name: homebrew-verify

# Groundskeeper does not currently publish a Homebrew tap/formula. Keep this
# guard on install-doc release wiring so Homebrew is not advertised until the
# tap is configured. Release tags are served by install.sh + GoReleaser assets.

on:
  pull_request:
    paths:
      - 'README.md'
      - 'install.sh'
      - '.goreleaser.yml'
      - 'scripts/verify-homebrew-install.sh'
      - '.github/workflows/homebrew-verify.yml'
  workflow_dispatch: {}

jobs:
  verify-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify homebrew tap publishes a working formula
        run: bash scripts/verify-homebrew-install.sh
